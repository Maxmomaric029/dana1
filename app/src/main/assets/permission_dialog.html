<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIE Permissions</title>
    <style>
        :root {
            --neon-green: #a7ff00;
            --cyber-cyan: #00f0ff;
            --bg-dark: rgba(10, 10, 15, 0.95);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: transparent;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .dialog-container {
            width: 90%;
            max-width: 340px;
            background: var(--bg-dark);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(167, 255, 0, 0.1);
            animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 24px;
            color: #fff;
        }

        .logo span {
            color: var(--neon-green);
            text-shadow: 0 0 15px rgba(167, 255, 0, 0.5);
        }

        .message {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 32px;
            color: rgba(255,255,255,0.9);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .btn-accept {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 5px 15px rgba(167, 255, 0, 0.3);
        }

        .btn-accept:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(167, 255, 0, 0.2);
        }

        .btn-decline {
            background: var(--glass);
            border-color: var(--border);
            color: rgba(255,255,255,0.6);
        }

        .btn-decline:active {
            background: rgba(255,255,255,0.08);
        }

        .footer-note {
            margin-top: 24px;
            font-size: 10px;
            font-family: 'Courier New', Consolas, monospace;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="dialog-container">
    <div class="logo">LI<span>E</span></div>
    <div class="message">
        Acepta los permisos de Free Fire para inyectar los archivos
    </div>
    
    <div class="btn-group">
        <div class="btn btn-accept" onclick="accept()">Aceptar</div>
        <div class="btn btn-decline" onclick="decline()">Rechazar</div>
    </div>

    <div class="footer-note">
        ENCRYPTED CONNECTION • v1.0.4
    </div>
</div>

<script>
    function accept() {
        if (window.Android) {
            Android.acceptPermissions();
        } else {
            console.log("Accepting permissions...");
        }
    }

    function decline() {
        if (window.Android) {
            Android.declinePermissions();
        } else {
            console.log("Declining permissions...");
        }
    }
</script>

</body>
</html>
